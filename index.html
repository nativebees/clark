<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="The Pacific Loop — a 13-day road trip up the West Coast with Sean, Jessi, and Bowie the Weimaraner." />
  <meta name="theme-color" content="#f4ead5" />
  <title>The Pacific Loop · A Griswold Production</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Special+Elite&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css" />

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='15' fill='%23b04a2f'/%3E%3Ctext x='50' y='68' font-family='Georgia,serif' font-size='55' font-weight='bold' fill='%23faf3e0' text-anchor='middle' font-style='italic'%3EP%3C/text%3E%3C/svg%3E">
</head>
<body>

  <header>
    <div class="stamp">A Griswold Production · No. 02</div>
    <h1 class="title">The Pacific Loop</h1>
    <p class="subtitle">Sean · Jessi · Bowie · Across the West with the wind in our windows</p>
    <div class="meta-strip" id="meta-strip"></div>
  </header>

  <div class="container">

    <!-- LEFT: Sticky route map -->
    <div class="map-wrap">
      <div class="map-header">
        <div class="map-title">Route map</div>
        <div class="map-key">Clockwise loop</div>
      </div>

      <svg viewBox="0 0 400 600" class="map-svg" xmlns="http://www.w3.org/2000/svg">
        <!-- Stylized West Coast outline -->
        <path class="land-mass" d="M 50 50 L 380 50 L 380 580 L 200 580 L 180 540 L 160 480 L 140 420 L 130 360 L 120 300 L 115 240 L 110 180 L 100 120 L 80 80 Z" />
        <path class="coast-line" d="M 80 80 Q 100 120 110 180 Q 115 240 120 300 Q 130 360 140 420 Q 160 480 180 540 L 200 580" />

        <!-- Route line — clockwise loop -->
        <path class="route-line" d="
          M 320 540
          Q 280 510 240 480
          Q 200 450 175 410
          Q 160 380 155 340
          Q 145 310 135 280
          Q 125 240 115 200
          Q 108 160 100 130
          Q 95 100 92 75
          L 105 90
          Q 130 130 150 175
          Q 175 220 195 270
          Q 215 320 235 370
          Q 260 425 285 475
          Q 305 510 320 540 Z
        " />

        <!-- Stop markers — wired up by app.js -->
        <g class="stop-marker" data-stop="0">
          <circle cx="320" cy="540" r="6" fill="#b04a2f" stroke="#2a1f17" stroke-width="2" />
          <text class="marker-label" x="335" y="544">Palm Springs · Start</text>
        </g>
        <g class="stop-marker" data-stop="1">
          <circle cx="245" cy="475" r="5" fill="#faf3e0" stroke="#2a1f17" stroke-width="2" />
          <text class="marker-label" x="258" y="479">Paso Robles</text>
        </g>
        <g class="stop-marker" data-stop="2">
          <circle cx="195" cy="430" r="5" fill="#faf3e0" stroke="#2a1f17" stroke-width="2" />
          <text class="marker-label" x="208" y="434">Carmel</text>
        </g>
        <g class="stop-marker" data-stop="3">
          <circle cx="160" cy="370" r="6" fill="#c89422" stroke="#2a1f17" stroke-width="2" />
          <text class="marker-label" x="173" y="374">SF + Marin · 2 nights</text>
        </g>
        <g class="stop-marker" data-stop="4">
          <circle cx="135" cy="280" r="5" fill="#faf3e0" stroke="#2a1f17" stroke-width="2" />
          <text class="marker-label" x="148" y="284">Eureka</text>
        </g>
        <g class="stop-marker" data-stop="5">
          <circle cx="115" cy="195" r="5" fill="#faf3e0" stroke="#2a1f17" stroke-width="2" />
          <text class="marker-label" x="128" y="199">Bandon</text>
        </g>
        <g class="stop-marker" data-stop="6">
          <circle cx="98" cy="105" r="6" fill="#c89422" stroke="#2a1f17" stroke-width="2" />
          <text class="marker-label" x="22" y="109">Cannon Beach · 2nt</text>
        </g>
        <g class="stop-marker" data-stop="7">
          <circle cx="160" cy="160" r="5" fill="#faf3e0" stroke="#2a1f17" stroke-width="2" />
          <text class="marker-label" x="173" y="164">Bend</text>
        </g>
        <g class="stop-marker" data-stop="8">
          <circle cx="220" cy="280" r="6" fill="#c89422" stroke="#2a1f17" stroke-width="2" />
          <text class="marker-label" x="233" y="284">Truckee · 2nt</text>
        </g>
        <g class="stop-marker" data-stop="9">
          <circle cx="270" cy="395" r="5" fill="#6b7a3f" stroke="#2a1f17" stroke-width="2" />
          <text class="marker-label" x="283" y="399">Mammoth · rest</text>
        </g>
      </svg>

      <div class="map-legend">
        <span><span class="legend-dot" style="background: var(--rust);"></span>Start/End</span>
        <span><span class="legend-dot" style="background: var(--mustard);"></span>2-night stay</span>
        <span><span class="legend-dot" style="background: var(--olive);"></span>Decompression</span>
        <span><span class="legend-dot" style="background: var(--paper); border: 1px solid var(--ink);"></span>Overnight</span>
      </div>
    </div>

    <!-- RIGHT: Stops list, rendered by app.js -->
    <div class="stops" id="stops"></div>

  </div>

  <!-- BUDGET FOOTER -->
  <div class="budget-footer">
    <h2 class="budget-title">The damages</h2>
    <p class="budget-sub">13 days · 12 paid nights · ~3,150 miles</p>
    <div class="budget-grid" id="budget-grid"></div>
  </div>

  <footer>
    <p class="footer-text">"Look, kids — Big Ben! Parliament!"</p>
  </footer>

  <!-- Scripts: data + postcards must load before app.js -->
  <script src="js/postcards.js"></script>
  <script src="js/trip-data.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
